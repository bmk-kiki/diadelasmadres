<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mamiiiii</title>
    <style>
        :root {
            --rose-color: #e63946;
            --stem-color: #2d6a4f;
        }

        body {
            background-color: #fff5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Bahnschrift Light', serif;
            overflow: hidden;
        }

        .rose-system {
            position: relative;
            cursor: pointer;
            display: none;
            margin-bottom: 150px;
        }

        .petal {
            width: 70px;
            height: 70px;
            background: var(--rose-color);
            border-radius: 50% 50% 0 50%;
            position: absolute;
            transform-origin: bottom right;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            text-align: center;
            box-shadow: inset 2px 2px 10px rgba(0,0,0,0.1);
        }

        .petal:active {
            filter: brightness(1.2);
            transform: scale(1.1) rotate(var(--rot)) !important;
        }

        .stem {
            width: 10px;
            height: 200px;
            background: var(--stem-color);
            border-radius: 5px;
            position: absolute;
            top: 60px;
            left: 60px;
            z-index: -1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal img {
            max-width: 85%;
            max-height: 60%;
            border: 8px solid white;
            border-radius: 15px;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-text {
            color: white;
            font-size: 2rem;
            margin-top: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes zoomIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #startBtn {
            padding: 20px 40px;
            font-size: 1.5rem;
            background: var(--rose-color);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="startBtn">Toca aqui para florecer... 🌸</button>

    <div class="rose-system" id="roseSystem">
        <div id="petalsContainer"></div>
        <div class="stem"></div>
    </div>

    <div class="modal" id="photoModal" onclick="this.style.display='none'">
        <img src="" id="modalImg">
        <div id="modalMsg" class="modal-text"></div>
        <p style="color: #ccc; margin-top: 30px;">Toca para cerrar</p>
    </div>

    <script>
    
        const photoList = [
            'images/foto1.jpg', 
            'images/foto2.jpg',
            'images/foto3.jpg',
            'images/foto4.jpg',
            'images/foto5.jpg',
            'images/foto6.jpg'
        ];

        const startBtn = document.getElementById('startBtn');
        const roseSystem = document.getElementById('roseSystem');
        const petalsContainer = document.getElementById('petalsContainer');
        const modal = document.getElementById('photoModal');
        const modalImg = document.getElementById('modalImg');
        const modalMsg = document.getElementById('modalMsg');

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            roseSystem.style.display = 'block';
            
            let photoIndex = 0;

            for (let i = 1; i <= 8; i++) {
                const petal = document.createElement('div');
                const rotation = (i - 1) * 45;
                petal.className = 'petal';
                petal.style.setProperty('--rot', `${rotation}deg`);
                petal.style.transform = `rotate(${rotation}deg)`;
                
                let content = {};
                
                if (i === 1 || i === 7) {
                    content.type = 'text';
                    content.data = "Te Amo Mamii";
                } else {
                    content.type = 'image';
                    content.data = photoList[photoIndex];
                    photoIndex++;
                }

                petal.onclick = (e) => {
                    e.stopPropagation();
                    if (content.type === 'text') {
                        modalImg.style.display = 'none';
                        modalMsg.innerText = content.data;
                    } else {
                        modalImg.src = content.data;
                        modalImg.style.display = 'block';
                        modalMsg.innerText = "";
                    }
                    modal.style.display = 'flex';
                };

                petalsContainer.appendChild(petal);
            }
        });
    </script>
</body>
</html>
